services:
  postgres:
    image: postgres:16-alpine
    container_name: finances-postgres
    environment:
      POSTGRES_USER: finances
      POSTGRES_PASSWORD: finances
      POSTGRES_DB: finances
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finances"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
