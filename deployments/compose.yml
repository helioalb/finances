services:
  postgres:
    image: postgres:16-alpine
    container_name: finances-postgres
    environment:
      POSTGRES_USER: finances
      POSTGRES_PASSWORD: finances
      POSTGRES_DB: finances
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finances"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    container_name: finances-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: finances
      DB_PASSWORD: finances
      DB_NAME: finances
      DB_SSLMODE: disable
    ports:
      - "8080:8080"
    networks:
      - finances-network

volumes:
  postgres_data:

networks:
  finances-network:
    driver: bridge
